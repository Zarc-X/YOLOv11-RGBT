# YOLO11 RGBT midfusion EFMv2 + true P2 detection head (P2/P3/P4/P5)
# Design goals:
# 1) Asymmetric modality slicing (primary branch sees full 4ch input, auxiliary branch sees IR channel).
# 2) Lightweight asymmetric fusion via ZeroConv2d + ADD, then Concat.
# 3) Add a real P2 detection head for small-object recall.

nc: 80
scales:  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]
scale: x

ch: 4

backbone:
  # [from, repeats, module, args]
  - [-1, 1, Silence, []]  # 0

  # Primary branch (asymmetric): take full 4 channels.
  - [0, 1, SilenceChannel, [0, 4]]  # 1
  - [-1, 1, Conv, [64, 3, 2]]  # 2 P1/2
  - [-1, 1, Conv, [128, 3, 2]]  # 3 P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]  # 4 P2/4
  - [-1, 1, Conv, [256, 3, 2]]  # 5 P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]  # 6 P3/8
  - [-1, 1, Conv, [512, 3, 2]]  # 7 P4/16
  - [-1, 2, C3k2, [512, True]]  # 8 P4/16
  - [-1, 1, Conv, [1024, 3, 2]]  # 9 P5/32
  - [-1, 2, C3k2, [1024, True]]  # 10 P5/32

  # Auxiliary branch: IR channel only.
  - [0, 1, SilenceChannel, [3, 4]]  # 11
  - [-1, 1, Conv, [64, 3, 2]]  # 12 P1/2
  - [-1, 1, Conv, [128, 3, 2]]  # 13 P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]  # 14 P2/4
  - [-1, 1, Conv, [256, 3, 2]]  # 15 P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]  # 16 P3/8
  - [-1, 1, Conv, [512, 3, 2]]  # 17 P4/16
  - [-1, 2, C3k2, [512, True]]  # 18 P4/16
  - [-1, 1, Conv, [1024, 3, 2]]  # 19 P5/32
  - [-1, 2, C3k2, [1024, True]]  # 20 P5/32

  # Asymmetric fusion at P2/P3/P4/P5: inject aux->primary, then concat.
  - [14, 1, ZeroConv2d, [256, 3, 1, 1]]  # 21
  - [[4, 21], 1, ADD, [0.7]]  # 22 fused primary P2
  - [[22, 14], 1, Concat, [1]]  # 23 fused P2

  - [16, 1, ZeroConv2d, [512, 3, 1, 1]]  # 24
  - [[6, 24], 1, ADD, [0.8]]  # 25 fused primary P3
  - [[25, 16], 1, Concat, [1]]  # 26 fused P3

  - [18, 1, ZeroConv2d, [512, 3, 1, 1]]  # 27
  - [[8, 27], 1, ADD, [0.8]]  # 28 fused primary P4
  - [[28, 18], 1, Concat, [1]]  # 29 fused P4

  - [20, 1, ZeroConv2d, [1024, 3, 1, 1]]  # 30
  - [[10, 30], 1, ADD, [1.0]]  # 31 fused primary P5
  - [[31, 20], 1, Concat, [1]]  # 32 fused P5

  - [-1, 1, SPPF, [1024, 5]]  # 33
  - [-1, 2, C2PSA, [1024]]  # 34

head:
  # Top-down path to P2
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 35
  - [[-1, 29], 1, Concat, [1]]  # 36 cat fused P4
  - [-1, 2, C3k2, [512, False]]  # 37 P4

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 38
  - [[-1, 26], 1, Concat, [1]]  # 39 cat fused P3
  - [-1, 2, C3k2, [256, False]]  # 40 P3

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 41
  - [[-1, 23], 1, Concat, [1]]  # 42 cat fused P2
  - [-1, 2, C3k2, [128, False]]  # 43 P2 output

  # Bottom-up refinement back to P5
  - [-1, 1, Conv, [128, 3, 2]]  # 44
  - [[-1, 40], 1, Concat, [1]]  # 45
  - [-1, 2, C3k2, [256, False]]  # 46 P3 output

  - [-1, 1, Conv, [256, 3, 2]]  # 47
  - [[-1, 37], 1, Concat, [1]]  # 48
  - [-1, 2, C3k2, [512, False]]  # 49 P4 output

  - [-1, 1, Conv, [512, 3, 2]]  # 50
  - [[-1, 34], 1, Concat, [1]]  # 51
  - [-1, 2, C3k2, [1024, True]]  # 52 P5 output

  - [[43, 46, 49, 52], 1, Detect, [nc]]  # 53 Detect(P2, P3, P4, P5)
